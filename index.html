<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GIVAP FREND - Troll Platformer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- CSS Modulares -->
    <link rel="stylesheet" href="css/style.css?v=1.1">
    <link rel="stylesheet" href="css/ui.css?v=1.1">
    <link rel="stylesheet" href="css/animations.css?v=1.1">
    
    <!-- Fuente Pixelada -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>

    <canvas id="game" width="900" height="400"></canvas>

    <div id="characterMenu">
        <h1>Elige tu personaje</h1>

        <div class="character-options">
            <div class="character-card selected" data-type="hero" id="card-hero">
                <canvas width="100" height="120" id="preview-hero"></canvas>
                <div class="card-info">
                    <h3>Principal</h3>
                    <p class="desc">Chico Equilibrado</p>
                    <p class="lives">Vidas: 10</p>
                    <p class="ability">Habilidad: Ninguna</p>
                </div>
            </div>

            <div class="character-card" data-type="ninja" id="card-ninja">
                <canvas width="100" height="120" id="preview-ninja"></canvas>
                <div class="card-info">
                    <h3>Ninja Sombra</h3>
                    <p class="desc">Ágil y oscuro</p>
                    <p class="lives">Vidas: 6</p>
                    <p class="ability">Habilidad: Doble Salto</p>
                </div>
            </div>

            <div class="character-card" data-type="robot" id="card-robot">
                <canvas width="100" height="120" id="preview-robot"></canvas>
                <div class="card-info">
                    <h3>Robot MK‑7</h3>
                    <p class="desc">Pesado y mecánico</p>
                    <p class="lives">Vidas: 6</p>
                    <p class="ability">Habilidad: Jetpack</p>
                </div>
            </div>
        </div>

        <button id="startBtn">JUGAR</button>
    </div>

    <!-- UI Overlay for Mobile -->
    <div class="mobile-hud">
        <button id="btnPause" class="pause-btn">II</button>
    </div>

    <div class="controls">
        <div class="left-controls">
            <button id="btnLeft" class="game-btn move-btn">&#8592;</button>
            <button id="btnRight" class="game-btn move-btn">&#8594;</button>
        </div>

        <div class="right-controls">
            <button id="btnJump" class="game-btn jump-btn">&#8593;</button>
        </div>
    </div>

    <!-- Game Over Popup -->
    <div id="gameOverScreen" class="overlay-screen">
        <div class="popup-box">
            <h2 id="gameOverTitle">HAS MUERTO</h2>
            <p id="gameOverStats">Muertes: 0 | Nivel: 1</p>
            <div class="popup-buttons">
                <button id="btnRetry">Reintentar</button>
                <button id="btnMenu">Menú</button>
            </div>
        </div>
    </div>

    <!-- Pause Menu Popup -->
    <div id="pauseMenuScreen" class="overlay-screen pause-overlay">
        <h2 class="pause-title">PAUSA</h2>
        <div class="pause-buttons">
            <button id="btnPauseResume" class="menu-retro-btn resume-btn">Continuar</button>
            <button id="btnPauseRestart" class="menu-retro-btn restart-btn">Reiniciar Nivel</button>
            <button id="btnPauseMenu" class="menu-retro-btn exit-btn">Menú Principal</button>
        </div>
    </div>

    <!-- Pantalla de Transición -->
    <div id="transitionScreen">
        <div class="transition-content">
            <div class="level-text">NIVEL</div>
            <div class="level-numbers">
                <div class="number-col">
                    <span id="transOldLevel">1</span>
                    <span id="transNewLevel">2</span>
                </div>
                <span class="slash">/</span>
                <span id="transMaxLevel">4</span>
            </div>
        </div>
    </div>

    <!-- UI Message Container -->
    <div id="ui-message-container" class="ui-message-container">
        <div class="rope left-rope"></div>
        <div class="rope right-rope"></div>
        <div id="ui-message-text"></div>
    </div>

    <!-- Lógica Modular del Juego (Carga tradicional para soportar file://) -->
    <script src="js/state.js?v=1.1"></script>
    <script src="js/utilities.js?v=1.1"></script>
    <script src="js/audio.js?v=1.1"></script>
    <script src="js/particles.js?v=1.1"></script>
    <script src="js/levels.js?v=1.1"></script>
    <script src="js/render.js?v=1.1"></script>
    <script src="js/player.js?v=1.1"></script>
    <script src="js/enemies.js?v=1.1"></script>
    <script src="js/traps.js?v=1.1"></script>
    <script src="js/ui.js?v=1.1"></script>
    <script src="js/main.js?v=1.1"></script>

</body>
</html>
