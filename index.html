<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GIVAP FREND - Troll Platformer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- CSS Modulares -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/ui.css">
    <link rel="stylesheet" href="css/animations.css">
    
    <!-- Fuente Pixelada -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>

    <canvas id="game" width="900" height="400"></canvas>

    <div id="characterMenu">
        <h1>Elige tu personaje</h1>

        <div class="character-options">
            <div class="character-card selected" data-type="hero" id="card-hero">
                <canvas width="80" height="100" id="preview-hero"></canvas>
                <h3>Rojo Clásico</h3>
                <p>MORIO</p>
            </div>

            <div class="character-card" data-type="ninja" id="card-ninja">
                <canvas width="80" height="100" id="preview-ninja"></canvas>
                <h3>Ninja Sombra</h3>
                <p>Ágil y oscuro</p>
            </div>

            <div class="character-card" data-type="robot" id="card-robot">
                <canvas width="80" height="100" id="preview-robot"></canvas>
                <h3>Robot MK‑7</h3>
                <p>Industrial</p>
            </div>
        </div>

        <button id="startBtn">JUGAR</button>
    </div>

    <!-- UI Overlay for Mobile -->
    <div class="mobile-hud">
        <button id="btnPause" class="pause-btn">⏸</button>
    </div>

    <div class="controls">
        <div class="left-controls">
            <button id="btnLeft" class="game-btn move-btn">⬅</button>
            <button id="btnRight" class="game-btn move-btn">➡</button>
        </div>

        <div class="right-controls">
            <button id="btnJump" class="game-btn jump-btn">⬆</button>
        </div>
    </div>

    <!-- Pantalla de Transición -->
    <div id="transitionScreen">
        <div class="transition-content">
            <div class="level-text">NIVEL</div>
            <div class="level-numbers">
                <div class="number-col">
                    <span id="transOldLevel">1</span>
                    <span id="transNewLevel">2</span>
                </div>
                <span class="slash">/</span>
                <span id="transMaxLevel">4</span>
            </div>
        </div>
    </div>

    <!-- Lógica Modular del Juego (Carga tradicional para soportar file://) -->
    <script src="js/state.js"></script>
    <script src="js/utilities.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/levels.js"></script>
    <script src="js/render.js"></script>
    <script src="js/player.js"></script>
    <script src="js/enemies.js"></script>
    <script src="js/traps.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
